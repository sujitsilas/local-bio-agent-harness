# Top-level harness config. Selects a hardware profile and sets run-wide defaults.
# Local-first (§1.7): cloud providers are OFF here and require explicit opt-in.

hardware_profile: "48gb"          # -> configs/hardware/48gb.yaml (this dev machine)
provider: "mlx_openai"            # "mlx_openai" | "ollama" | "cloud"(opt-in)
serving_backend: "mlx_lm_server"  # "lm_studio" | "mlx_lm_server" | "ollama" (§15.3)

# Cloud egress for LLM inference — disabled by default (§1.7, §13.1).
allow_cloud_llm: false

paths:
  runs_dir: ".runs"               # per-Run venv + artifacts + snapshots
  state_db: ".runs/bioagent.sqlite"
  vector_db: ".runs/vectors.lance"
  base_env: "configs/base_env.txt"
  network_allowlist: "configs/network_allowlist.yaml"
  seeds_dir: "bioagent/seeds"

sampling:                         # ORTHOGONAL to model choice (§4.1)
  planner:   { temperature: 0.2, top_p: 0.95 }
  classifier: { temperature: 0.0, top_p: 1.0 }  # classification at temp≈0 always
  synthesis: { temperature: 0.4, top_p: 0.95 }

execution:
  cell_timeout_s: 300
  memory_ceiling_gb: 24           # per-cell mem cap; kill+report on breach
  output_size_cap_kb: 256
  analysis_cell_network: false    # blocked; deps via install_package only (§13.1)

install_policy:
  allowlist_only: false           # if true, only packages in `allowed_packages` install
  allowed_packages: [harmonypy, scvi-tools, decoupler, gseapy, celltypist, scrublet,
                     scanpy, anndata, leidenalg, igraph, scikit-misc]
  max_download_mb: 2048

graph:
  recursion_depth_max: 2          # §15.4 default
  subcluster_budget: 8            # total subcluster passes per Run
  integration_default: "harmony"  # §15.2; scVI only on dev machine, opt-in

review:
  mode: "autonomous_flag"         # "autonomous_flag" | "human_in_loop" (interrupt())
