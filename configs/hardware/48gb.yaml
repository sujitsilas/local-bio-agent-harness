# 48 GB+ dev machine (Apple M5 Pro). One big primary as unified reasoning+coder,
# plus an optional tiny classifier, plus data.
# A separate 46 GB coder does NOT coexist with a 20 GB primary here — keep
# single-primary unless on 64 GB+ (§2, §14).
#
# Active config serves via mlx_lm.server (pure MLX, best perf on Apple silicon).
# Start it with (auto-downloads the weights from HuggingFace on first run):
#   .venv/bin/python -m mlx_lm.server --model mlx-community/Qwen3.6-35B-A3B-4bit --port 8080
# The classifier reuses the primary so mlx_lm.server keeps one model resident.
tier: "48gb"
concurrent_models: true

models:
  primary:                        # unified reasoning + code-writer
    profile: primary
    model: "mlx-community/Qwen3.6-35B-A3B-4bit"  # ~20 GB MoE (~3B active), MLX 4-bit
    endpoint: "http://localhost:8080/v1"
    api_key: "not-needed"
    supports_response_format: false  # prompted-JSON + repair path (§4.3); flip to true
                                     # only if serving with Outlines-constrained decoding
    max_tokens: 8192
    # Qwen3.6 is a REASONING model. Thinking is ON so its chain-of-thought STREAMS into
    # the chat live (delta.reasoning) before the answer. max_tokens is generous so
    # reasoning + the JSON answer both fit; if a structured reply still truncates, the
    # repair retry forces thinking OFF and recovers clean JSON. Set enable_thinking:false
    # here to trade the visible reasoning for faster, tighter output.
    extra_body: { chat_template_kwargs: { enable_thinking: true } }
  classifier:                     # reuse primary (one resident model)
    profile: classifier
    model: "mlx-community/Qwen3.6-35B-A3B-4bit"
    endpoint: "http://localhost:8080/v1"
    api_key: "not-needed"
    supports_response_format: false
    max_tokens: 6144
    extra_body: { chat_template_kwargs: { enable_thinking: true } }

anndata:
  backed_mode: false
  subsample_interactive: 100000
