# Network policy (§13.1). Three egress tiers; everything else is local-only + blocked.
# Enforced at the process/proxy level, not just by convention.

# Tier 1 — Provisioning: package + model-weight downloads only. No user data.
provisioning:
  hosts:
    - pypi.org
    - files.pythonhosted.org
    - huggingface.co
    - cdn-lfs.huggingface.co
  allowed_tools: [install_package]

# Tier 2 — Knowledge layer: scientific-source APIs. Minimal queries only
# (gene symbols, signature names, search terms) — never expression matrices.
knowledge:
  hosts:
    - eutils.ncbi.nlm.nih.gov      # pubmed
    - www.ncbi.nlm.nih.gov         # geo
    - rest.ensembl.org             # ensembl
    - rest.uniprot.org             # uniprot
    - api.cellxgene.cziscience.com # cellxgene (optional)
  allowed_tools: [pubmed, geo, ensembl, uniprot, cellxgene]

# Tier 3 — Local-only (blocked from network entirely):
# LLM inference, embeddings, vector store, structured store,
# code_exec analysis cells, report builder.
local_only:
  - code_exec
  - plotting
  - scanpy_ops
